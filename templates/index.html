<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker + Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <h1>Expense Tracker + AI Chat</h1>

    <section class="card">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <input id="name" placeholder="Expense name" required />
        <input id="amount" type="number" step="0.01" min="0" placeholder="Amount" required />
        <select id="category" required>
          <option value="" disabled selected>Select category</option>
          <option>Food</option>
          <option>Transport</option>
          <option>Shopping</option>
          <option>Bills</option>
          <option>Other</option>
        </select>
        <button type="submit">Save Expense</button>
      </form>
      <p id="form-message"></p>
    </section>

    <section class="card">
      <h2>Total Spending</h2>
      <p id="total-spending">$0.00</p>
    </section>

    <section class="card">
      <h2>Expenses</h2>
      <ul id="expense-list"></ul>
    </section>

    <section class="card">
      <h2>AI Chat</h2>
      <div id="chat-box"></div>
      <form id="chat-form">
        <input id="chat-message" placeholder="Type a message..." required />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const expenseForm = document.getElementById('expense-form');
    const formMessage = document.getElementById('form-message');
    const expenseList = document.getElementById('expense-list');
    const totalSpendingEl = document.getElementById('total-spending');
    const chatForm = document.getElementById('chat-form');
    const chatBox = document.getElementById('chat-box');

    async function loadExpensesAndSummary() {
      const [expensesRes, summaryRes] = await Promise.all([
        fetch('/get-expenses'),
        fetch('/summary')
      ]);

      const expensesData = await expensesRes.json();
      const summaryData = await summaryRes.json();

      renderExpenses(expensesData.expenses || []);
      totalSpendingEl.textContent = `$${Number(summaryData.total_spending || 0).toFixed(2)}`;
    }

    function renderExpenses(expenses) {
      expenseList.innerHTML = '';
      if (!expenses.length) {
        expenseList.innerHTML = '<li>No expenses yet.</li>';
        return;
      }

      expenses.forEach((expense) => {
        const li = document.createElement('li');
        li.textContent = `${expense.name} — $${Number(expense.amount).toFixed(2)} (${expense.category})`;
        expenseList.appendChild(li);
      });
    }

    expenseForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const payload = {
        name: document.getElementById('name').value,
        amount: document.getElementById('amount').value,
        category: document.getElementById('category').value
      };

      const response = await fetch('/add-expense', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (!response.ok) {
        formMessage.textContent = data.error || 'Unable to add expense.';
        return;
      }

      formMessage.textContent = 'Expense added successfully.';
      expenseForm.reset();
      await loadExpensesAndSummary();
    });

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const messageInput = document.getElementById('chat-message');
      const message = messageInput.value.trim();
      if (!message) return;

      chatBox.innerHTML += `<p class="user"><strong>You:</strong> ${message}</p>`;

      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await response.json();

      chatBox.innerHTML += `<p class="bot"><strong>Agent:</strong> ${data.response || data.error}</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      messageInput.value = '';
    });

    loadExpensesAndSummary();
  </script>
</body>
</html>
